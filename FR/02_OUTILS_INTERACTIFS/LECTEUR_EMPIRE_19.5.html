<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE 19.5 | Visualiseur Expert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0f172a; --bg-card: #1e293b; --accent: #3b82f6; --text-main: #f1f5f9; --sidebar-width: 320px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: var(--sidebar-width); background: var(--bg-card); border-right: 1px solid #334155; overflow-y: auto; height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #334155; }
        #nav-tree { flex-grow: 1; overflow-y: auto; }
        #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 3rem; background: var(--bg-dark); scroll-behavior: smooth; }
        .nav-link { padding: 0.6rem 1.5rem; color: #94a3b8; font-size: 0.85rem; display: flex; align-items: center; text-decoration: none; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-link:hover { background: #334155; color: white; }
        .nav-link.active { background: #1e3a8a; color: white; border-left-color: var(--accent); }
        .day-header { padding: 1rem 1.5rem 0.5rem; font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .markdown-body pre { background: #000; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; color: #e2e8f0; position: relative; overflow-x: auto; }
        .uml-container { background: white; padding: 30px; border-radius: 15px; margin: 2rem 0; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .uml-container img { max-width: 100%; height: auto; }
        .api-config { padding: 1rem; border-top: 1px solid #334155; background: #0f172a; }
        #loader { display: none; position: fixed; top: 20px; right: 20px; z-index: 9999; }
        code { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body>

    <div id="loader" class="spinner-border text-primary" role="status"></div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h5 class="fw-bold mb-0"><i class="bi bi-shield-lock-fill text-warning"></i> EMPIRE 19.5</h5>
            <small class="text-muted">Système de Formation Expert</small>
        </div>
        <div id="nav-tree"></div>
        <div class="api-config">
            <label class="small text-muted mb-1">VPS API UML</label>
            <input type="text" id="api-url" class="form-control form-control-sm bg-dark text-white border-secondary" value="http://31.97.245.179:7788">
        </div>
    </div>

    <div id="content-wrapper">
        <div id="render-area" class="container markdown-body" style="max-width: 900px;">
            <div class="text-center mt-5">
                <i class="bi bi-book text-info display-1 mb-4"></i>
                <h1>Chargement Prêt</h1>
                <p class="lead text-muted">Sélectionnez un module dans la barre latérale pour commencer votre révision.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        const BASE_PATH = "/FR/01_FORMATION_INTENSIVE_14_JOURS";
        
        const SPRINT = [
            { day: "J01", folder: "Jour_01_Setup_Theorie", files: ["Seance_Jour_01.md"] },
            { day: "J02", folder: "Jour_02_SQL_Creation", files: ["Cours_Detaille_Creation_SQL.md", "Template_Creation_SQL.sql"] },
            { day: "J03", folder: "Jour_03_SQL_Requetes", files: ["Cours_Detaille_Requetes_SQL.md", "Template_Requetes_SQL.sql"] },
            { day: "J04", folder: "Jour_04_Web_Interface", files: ["Cours_Detaille_Web_Bootstrap.md", "Structure_Marketplace.php"] },
            { day: "J05", folder: "Jour_05_Web_PHP", files: ["Cours_Detaille_Web_PHP.md", "Formulaire_PHP.php"] },
            { day: "J06", folder: "Jour_06_Web_JS", files: ["Cours_Detaille_Web_JS.md", "Panier_LocalStorage.js"] },
            { day: "J08", folder: "Jour_08_UML_Cas_Sequence", files: ["Cours_Detaille_UML_Cas_Sequence.md", "Diagrammes_Cas_Sequence.puml"] },
            { day: "J09", folder: "Jour_09_UML_Classes", files: ["Cours_Detaille_UML.md", "Diagramme_Classes.puml"] },
            { day: "J10", folder: "Jour_10_JAVA_Bases", files: ["Cours_Detaille_Java_Encapsulation.md", "Account.java", "Account_Basic.java"] },
            { day: "J11", folder: "Jour_11_JAVA_Methodes", files: ["Cours_Detaille_JAVA.md", "Article.java", "Article_Advanced.java"] },
            { day: "J12", folder: "Jour_12_Examen_Blanc_1", files: ["Correction_Examen_1.md", "Resolution_Sujet_1_Aerien_Maillots.md"] },
            { day: "J13", folder: "Jour_13_Examen_Blanc_2", files: ["Correction_Examen_2.md", "Resolution_Sujet_2_Fournitures_Banque.md"] },
            { day: "J14", folder: "Jour_14_Optimisation", files: ["Hacks_Productivite.md"] }
        ];

        function textToHex(str) {
            let res = "";
            for (let i = 0; i < str.length; i++) {
                res += str.charCodeAt(i).toString(16).padStart(2, '0');
            }
            return res;
        }

        function getUmlUrl(puml) {
            const apiBase = document.getElementById('api-url').value.trim().replace(/\/$/, '');
            puml = puml.trim();
            if (!puml.startsWith("@startuml")) puml = "@startuml\n" + puml + "\n@enduml";
            const hex = textToHex(puml);
            return `${apiBase}/svg/~h${hex}`;
        }

        async function loadFile(path) {
            document.getElementById('loader').style.display = 'block';
            const area = document.getElementById('render-area');
            try {
                const res = await fetch(path);
                if (!res.ok) throw new Error("Fichier introuvable");
                let content = await res.text();

                if (path.endsWith('.md')) {
                    // Remplacement des blocs UML dans le Markdown AVANT le parse pour éviter les conflits
                    const umlRegex = /@startuml[\s\S]*?@enduml/g;
                    const finalContent = content.replace(umlRegex, (match) => {
                        return `<div class="uml-container"><img src="${getUmlUrl(match)}" alt="Diagramme UML"></div>`;
                    });
                    area.innerHTML = marked.parse(finalContent);
                } else {
                    // Pour les fichiers .puml ou code source
                    let preview = "";
                    if (path.endsWith('.puml') || content.includes("@startuml")) {
                        preview = `<div class="uml-container"><h5>Rendu Automatique</h5><img src="${getUmlUrl(content)}"></div>`;
                    }
                    area.innerHTML = `<h1>Fichier</h1><code>${path}</code>${preview}<pre><code>${content.replace(/&/g, '&amp;').replace(/</g, '&lt;')}</code></pre>`;
                }
            } catch (e) { area.innerHTML = `<div class="alert alert-danger">Erreur : ${e.message}</div>`; }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('content-wrapper').scrollTop = 0;
        }

        // Sidebar
        const tree = document.getElementById('nav-tree');
        SPRINT.forEach(day => {
            const h = document.createElement('div'); h.className = 'day-header'; h.innerText = day.day; tree.appendChild(h);
            day.files.forEach(f => {
                const a = document.createElement('a'); a.className = 'nav-link'; a.href = "#"; a.innerHTML = `<i class="bi bi-file-earmark-code me-2"></i> ${f}`;
                a.onclick = (e) => { 
                    e.preventDefault(); 
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); 
                    a.classList.add('active'); 
                    loadFile(`${BASE_PATH}/${day.folder}/${f}`); 
                };
                tree.appendChild(a);
            });
        });
    </script>
</body>
</html>
